<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0;
            margin: 0;
        }
        
        .box {
            position: relative;
            border: 1px solid #00f;
            margin: 0 auto;
            width: 500px;
            height: 300px;
        }
        
        .ul {
            display: flex;
            list-style: none;
        }
        
        .ul li {
            flex: 1;
            text-align: center;
        }
        
        .box div {
            position: absolute;
            height: 279px;
            width: 500px;
            text-align: center;
            line-height: 279px;
            font-size: 50px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="box">
        <ul class="ul">
            <li id="active">1</li>
            <li>2</li>
            <li>3</li>
        </ul>
        <div id="active">1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <script>
        window.onload = function() {
            var lis = document.querySelectorAll('.ul li');
            var divs = document.querySelectorAll('.box div');
            var i = 0;
            for (i = 0; i < lis.length; i++) {
                lis[i].index = i; //记录索引值
                lis[i].onclick = function() {
                    for (var j = 0; j < lis.length; j++) {
                        lis[j].className = "";
                        divs[j].style.display = 'none';
                    }
                    this.className = "active";
                    divs[this.index].style.display = "block";
                }
            }
        }
    </script>
</body>

</html>
